<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="32" height="32" fill="#0969da"/>

  <!-- Three nodes representing distributed systems -->
  <circle cx="8" cy="12" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="24" cy="12" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="16" cy="22" r="3" fill="#ffffff" opacity="0.9"/>

  <!-- Connections between nodes -->
  <line x1="8" y1="12" x2="24" y2="12" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="8" y1="12" x2="16" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="24" y1="12" x2="16" y2="22" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
</svg>
